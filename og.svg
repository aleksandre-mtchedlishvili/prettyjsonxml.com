<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e16"/>
      <stop offset="100%" stop-color="#131724"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#7c9cff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7c9cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c9cff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="heading" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c0c8e0"/>
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle border vignette -->
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#2a3142" stroke-width="1"/>

  <!-- Top: logo + brand -->
  <g transform="translate(80, 70)">
    <rect width="64" height="64" rx="16" fill="url(#logo)" filter="url(#logoShadow)"/>
    <text x="32" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle">{ }</text>
    <text x="84" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="600" fill="#e6e9ef" letter-spacing="-0.3">Pretty</text>
    <text x="184" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="400" fill="#8b93a7">JSON &amp; XML</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 240)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="78" font-weight="700" fill="url(#heading)" letter-spacing="-2">
      <tspan x="0" y="0">Paste JSON or XML.</tspan>
      <tspan x="0" y="84">Get a beautiful table.</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <g transform="translate(80, 410)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text font-size="24" font-weight="600" fill="#ffffff" x="0" y="0">Searchable, sortable, expandable.</text>
    <text font-size="24" font-weight="400" fill="#b8c0d4" x="0" y="34">100% in your browser — never uploaded. Tree view + image preview.</text>
  </g>

  <!-- Feature badges -->
  <g transform="translate(80, 495)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <!-- Badge: Free Forever -->
    <g>
      <rect x="0" y="0" width="170" height="44" rx="22" fill="#7c9cff" fill-opacity="0.08" stroke="#7c9cff" stroke-opacity="0.32"/>
      <circle cx="22" cy="22" r="4" fill="#59d4a4"/>
      <text x="38" y="28" font-size="16" font-weight="500" fill="#e6e9ef">Free Forever</text>
    </g>
    <!-- Badge: No Signup -->
    <g transform="translate(184, 0)">
      <rect width="148" height="44" rx="22" fill="#7c9cff" fill-opacity="0.08" stroke="#7c9cff" stroke-opacity="0.32"/>
      <circle cx="22" cy="22" r="4" fill="#59d4a4"/>
      <text x="38" y="28" font-size="16" font-weight="500" fill="#e6e9ef">No Signup</text>
    </g>
    <!-- Badge: Private -->
    <g transform="translate(346, 0)">
      <rect width="194" height="44" rx="22" fill="#7c9cff" fill-opacity="0.08" stroke="#7c9cff" stroke-opacity="0.32"/>
      <circle cx="22" cy="22" r="4" fill="#59d4a4"/>
      <text x="38" y="28" font-size="16" font-weight="500" fill="#e6e9ef">Private &amp; Secure</text>
    </g>
    <!-- Badge: Any Browser -->
    <g transform="translate(554, 0)">
      <rect width="216" height="44" rx="22" fill="#7c9cff" fill-opacity="0.08" stroke="#7c9cff" stroke-opacity="0.32"/>
      <circle cx="22" cy="22" r="4" fill="#59d4a4"/>
      <text x="38" y="28" font-size="16" font-weight="500" fill="#e6e9ef">Open in Any Browser</text>
    </g>
  </g>

  <!-- Footer: formats + URL -->
  <g transform="translate(80, 580)" font-family="'JetBrains Mono', Consolas, monospace">
    <g>
      <rect x="0" y="-22" width="56" height="28" rx="5" fill="#1a2030" stroke="#2a3142"/>
      <text x="28" y="-3" font-size="14" fill="#b8c0d4" text-anchor="middle">.xml</text>
    </g>
    <g transform="translate(66, 0)">
      <rect x="0" y="-22" width="64" height="28" rx="5" fill="#1a2030" stroke="#2a3142"/>
      <text x="32" y="-3" font-size="14" fill="#b8c0d4" text-anchor="middle">.json</text>
    </g>
    <g transform="translate(140, 0)">
      <rect x="0" y="-22" width="62" height="28" rx="5" fill="#1a2030" stroke="#2a3142"/>
      <text x="31" y="-3" font-size="14" fill="#b8c0d4" text-anchor="middle">SOAP</text>
    </g>
    <g transform="translate(212, 0)">
      <rect x="0" y="-22" width="50" height="28" rx="5" fill="#1a2030" stroke="#2a3142"/>
      <text x="25" y="-3" font-size="14" fill="#b8c0d4" text-anchor="middle">RSS</text>
    </g>
    <g transform="translate(272, 0)">
      <rect x="0" y="-22" width="58" height="28" rx="5" fill="#1a2030" stroke="#2a3142"/>
      <text x="29" y="-3" font-size="14" fill="#b8c0d4" text-anchor="middle">Atom</text>
    </g>
    <g transform="translate(340, 0)">
      <rect x="0" y="-22" width="56" height="28" rx="5" fill="#1a2030" stroke="#2a3142"/>
      <text x="28" y="-3" font-size="14" fill="#b8c0d4" text-anchor="middle">POM</text>
    </g>
    <g transform="translate(406, 0)">
      <rect x="0" y="-22" width="50" height="28" rx="5" fill="#1a2030" stroke="#2a3142"/>
      <text x="25" y="-3" font-size="14" fill="#b8c0d4" text-anchor="middle">SVG</text>
    </g>
  </g>
  <text x="1120" y="582" font-family="'JetBrains Mono', Consolas, monospace" font-size="18" fill="#7c9cff" text-anchor="end">prettyjsonxml.com</text>
</svg>
