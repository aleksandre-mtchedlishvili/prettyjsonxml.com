<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image Template</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: #0b0e16;
    color: #e6e9ef;
    width: 1200px;
    height: 630px;
    position: relative;
  }
  /* Gradient backdrop */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 25%, rgba(124, 156, 255, 0.18) 0%, transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(192, 132, 252, 0.18) 0%, transparent 45%),
      linear-gradient(135deg, #0b0e16 0%, #131724 100%);
    z-index: 0;
  }
  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    padding: 70px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .logo {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, #7c9cff, #c084fc);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 30px;
    box-shadow: 0 10px 32px rgba(124, 156, 255, 0.4);
  }
  .brand {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .brand-sub {
    color: #8b93a7;
    font-weight: 400;
  }
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  h1 {
    font-size: 78px;
    line-height: 1.05;
    letter-spacing: -2px;
    font-weight: 700;
    margin-bottom: 24px;
    background: linear-gradient(135deg, #ffffff 0%, #c0c8e0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline {
    font-size: 26px;
    color: #b8c0d4;
    line-height: 1.4;
    max-width: 900px;
    font-weight: 400;
  }
  .tagline strong {
    color: #ffffff;
    font-weight: 600;
  }
  .badges {
    display: flex;
    gap: 12px;
    margin-top: 36px;
    flex-wrap: wrap;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 24px;
    font-size: 17px;
    font-weight: 500;
    border: 1px solid rgba(124, 156, 255, 0.3);
    background: rgba(124, 156, 255, 0.08);
    color: #e6e9ef;
  }
  .badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #59d4a4;
    box-shadow: 0 0 8px #59d4a4;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    color: #5e6678;
    font-size: 18px;
    font-family: 'JetBrains Mono', Consolas, monospace;
  }
  .formats {
    display: flex;
    gap: 14px;
  }
  .fmt {
    background: #1a2030;
    padding: 6px 14px;
    border-radius: 6px;
    color: #b8c0d4;
    font-size: 16px;
    border: 1px solid #2a3142;
  }
  .url {
    color: #7c9cff;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo">{ }</div>
      <div class="brand">Data Viewer<span class="brand-sub"> — XML &amp; JSON</span></div>
    </div>

    <div class="center">
      <h1>View XML &amp; JSON,<br>Beautifully.</h1>
      <div class="tagline">
        <strong>Pretty table &amp; tree views</strong>, instant search, inline image preview.
        <br>100% client-side — your files never leave the browser.
      </div>
      <div class="badges">
        <span class="badge"><span class="dot"></span>Free Forever</span>
        <span class="badge"><span class="dot"></span>No Signup</span>
        <span class="badge"><span class="dot"></span>Private &amp; Secure</span>
        <span class="badge"><span class="dot"></span>Open in Any Browser</span>
      </div>
    </div>

    <div class="footer">
      <div class="formats">
        <span class="fmt">.xml</span>
        <span class="fmt">.json</span>
        <span class="fmt">SOAP</span>
        <span class="fmt">RSS</span>
        <span class="fmt">Atom</span>
        <span class="fmt">POM</span>
        <span class="fmt">SVG</span>
      </div>
      <div class="url">YOUR-DOMAIN.com</div>
    </div>
  </div>
</body>
</html>
